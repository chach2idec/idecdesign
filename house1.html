<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modern Luxury House</title>

<style>
body{
  margin:0;
  background:#0f0f0f;
  font-family:sans-serif;
}

/* ===== HERO ===== */
.hero{
  position:relative;
}

.hero img{
  width:100%;
  height:90vh;
  object-fit:cover;
  display:block;
}

.hero-text{
  position:absolute;
  bottom:40px;
  left:40px;
  color:white;
}

.hero-text h1{
  font-size:36px;
  margin:0;
}

.hero-text p{
  opacity:0.7;
}

/* ===== GALLERY ===== */
.gallery{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:15px;
  padding:20px;
}

.gallery img{
  width:100%;
  border-radius:16px;
  display:block;
  transition:0.3s;
}

.gallery img:hover{
  transform:scale(1.03);
}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .gallery{
    grid-template-columns: 1fr;
  }

  .hero-text h1{
    font-size:24px;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="images/house1/01-cover.jpg">

  <div class="hero-text">
    <h1>Modern Luxury House</h1>
    <p>Bangkok, Thailand</p>
  </div>
</div>

<!-- GALLERY -->
<div class="gallery">
  <img src="images/house1/02.jpg">
  <img src="images/house1/03.jpg">
  <img src="images/house1/04.jpg">
  <img src="images/house1/05.jpg">
</div>

</body>
</html>
