<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mantana-100plus-Bangkhunthian-chaithalae Type202</title>

<style>
body{
  margin:0;
  background:#0f0f0f;
  font-family:sans-serif;
}

/* HERO */
.hero{
  position:relative;
  background:#000;
}

.hero img{
  width:100%;
  height:90vh;
  object-fit:contain;
  display:block;
}

@media(max-width:768px){
  .hero img{
    object-fit:cover;
  }
}

.hero-text{
  position:absolute;
  bottom:40px;
  left:40px;
  color:white;
}

.hero-text h1{
  font-size:36px;
  margin:0;
}

.hero-text p{
  opacity:0.7;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:15px;
  padding:20px;
}

.gallery img{
  width:100%;
  border-radius:16px;
  cursor:pointer;
  transition:0.3s;
}

.gallery img:hover{
  transform:scale(1.03);
}

@media(max-width:768px){
  .gallery{
    grid-template-columns:1fr;
  }

  .hero-text h1{
    font-size:24px;
  }
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  color:white;
  font-size:40px;
  cursor:pointer;
}

.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  color:white;
  font-size:50px;
  cursor:pointer;
  padding:10px;
}

.left{ left:20px; }
.right{ right:20px; }
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="images/project1/01-cover.jpg">

  <div class="hero-text">
    <h1>Mantana-100plus-Type202</h1>
    <p>Bangkhunthian-Chaithalae</p>
  </div>
</div>

<!-- GALLERY -->
<div class="gallery">
  <img src="images/project1/02.jpg" onclick="openLightbox(0)">
  <img src="images/project1/03.jpg" onclick="openLightbox(1)">
  <img src="images/project1/04.jpg" onclick="openLightbox(2)">
  <img src="images/project1/05.jpg" onclick="openLightbox(3)">
  <img src="images/project1/06.jpg" onclick="openLightbox(4)">
  <img src="images/project1/07.jpg" onclick="openLightbox(5)">
  <img src="images/project1/08.jpg" onclick="openLightbox(6)">  
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="close" onclick="closeLightbox()">×</span>
  <span class="arrow left" onclick="prev()">❮</span>
  <img id="lightbox-img">
  <span class="arrow right" onclick="next()">❯</span>
</div>

<script>
const images = [
"images/project1/02.jpg",
"images/project1/03.jpg",
"images/project1/04.jpg",
"images/project1/05.jpg",
"images/project1/06.jpg",
"images/project1/07.jpg",
"images/project1/08.jpg"
];

let current = 0;

function openLightbox(index){
  current = index;
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = images[current];
}

function closeLightbox(){
  document.getElementById("lightbox").style.display = "none";
}

function next(){
  current = (current + 1) % images.length;
  document.getElementById("lightbox-img").src = images[current];
}

function prev(){
  current = (current - 1 + images.length) % images.length;
  document.getElementById("lightbox-img").src = images[current];
}
</script>

</body>
</html>
